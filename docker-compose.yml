services:
  # Fuzzer Core - API and orchestration
  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fuzzer-core
    ports:
      - "8000:8000"
    volumes:
      # Persist all data (corpus, crashes, logs, correlation DB)
      - ./data:/app/data
      # Development: mount plugins for live reload
      - ./core/plugins:/app/core/plugins
    environment:
      - FUZZER_API_HOST=0.0.0.0
      - FUZZER_API_PORT=8000
      - FUZZER_CORPUS_DIR=/app/data/corpus
      - FUZZER_CRASH_DIR=/app/data/crashes
    networks:
      - fuzzer-network
    restart: unless-stopped

  # Target Manager — dynamic test server lifecycle management
  # Start/stop test servers via API without restarting containers.
  # API: http://localhost:8001  |  Target ports: 9990-9999
  target-manager:
    build:
      context: .
      dockerfile: Dockerfile.target-manager
    container_name: fuzzer-target-manager
    ports:
      - "8001:8001"
      - "9990-9999:9990-9999"
    networks:
      - fuzzer-network
    restart: unless-stopped

  # Fuzzer Probe (optional - can run externally)
  # probe:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.probe
  #   container_name: fuzzer-probe
  #   environment:
  #     - FUZZER_CORE_URL=http://core:8000
  #     - FUZZER_TARGET_HOST=target-manager
  #     - FUZZER_TARGET_PORT=9999
  #   depends_on:
  #     - core
  #     - target-manager
  #   networks:
  #     - fuzzer-network
  #   restart: unless-stopped

networks:
  fuzzer-network:
    driver: bridge
